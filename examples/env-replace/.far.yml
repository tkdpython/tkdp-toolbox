# .far.yml — configuration for the tkdptoolbox env-replace command
#
# Each list item is a mapping of environment name to its specific value.
# Items with the same logical meaning are grouped as a single entry.
#
# Run `tkdptoolbox env-replace --src-env <source> --dst-env <destination>` to
# replace all source values with the corresponding destination values across
# every .md, .yaml, and .yml file found under this directory.

- staging: db-staging.internal
  production: db.internal
- staging: https://api-staging.example.com
  production: https://api.example.com
- staging: registry-staging.example.com
  production: registry.example.com
